<!DOCTYPE html>
<html>
<head>

<title>Add Customer</title>

<style>

body{
    background:#eef2f7;
    font-family:Segoe UI;
}

.container{
    width:600px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#2563eb;
    margin-bottom:30px;
}

label{
    font-weight:bold;
}

input,textarea{

width:100%;
padding:12px;
margin:10px 0 20px;
border:1px solid #ccc;
border-radius:8px;

}

button{

width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#1d4ed8;
}

.back{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Add Customer</h1>

<form action="/addCustomer" method="POST">

<label>Customer Name</label>
<input type="text" name="name" required>

<label>Company Name</label>
<input type="text" name="company_name">

<label>Email</label>
<input type="email" name="email">

<label>Phone</label>
<input type="text" name="phone">

<label>Address</label>
<textarea name="address"></textarea>

<button type="submit">
Save Customer
</button>

</form>

<a href="/customers" class="back">
← Back to Customers
</a>

</div>

</body>
</html>
