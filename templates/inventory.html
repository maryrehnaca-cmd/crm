<!DOCTYPE html>
<html>

<head>

<title>Inventory</title>

<style>

body{
    background:#eef2f7;
    font-family:Segoe UI;
    padding:40px;
}

h1{
    color:#2563eb;
}

.add-btn{
    display:inline-block;
    background:#2563eb;
    color:white;
    padding:12px 25px;
    text-decoration:none;
    border-radius:8px;
    margin:20px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

th{
    background:#2563eb;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f5f5f5;
}

</style>

</head>

<body>

<h1>📦 Inventory</h1>

<a href="/addInventoryPage" class="add-btn">
+ Add Inventory
</a>

<table>
    <tr>
        <th>ID</th>
        <th>Product</th>
        <th>Quantity</th>
        <th>Warehouse</th>
        <th>Unit Price</th>
    </tr>

    {{range .}}
    <tr>
        <td>{{.ProductID}}</td>
        <td>{{.ProductName}}</td>
        <td>{{.Quantity}}</td>
        <td>{{.Warehouse}}</td>
        <td>₹{{.UnitPrice}}</td>
    </tr>
    {{end}}
</table>

</body>

</html>
